<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6C3CE1"/>
    </marker>
    <marker id="arrLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">MCP Stdio Message Flow</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">Three-step handshake → tool discovery → tool calls</text>

  <!-- Column headers -->
  <rect x="100" y="72" width="140" height="32" rx="8" fill="#2563EB" filter="url(#shadow)"/>
  <text x="170" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="white">AI Agent (Client)</text>

  <rect x="560" y="72" width="140" height="32" rx="8" fill="#6C3CE1" filter="url(#shadow)"/>
  <text x="630" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="white">lightpanda mcp</text>

  <!-- Lifelines -->
  <line x1="170" y1="104" x2="170" y2="500" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="630" y1="104" x2="630" y2="500" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6,4"/>

  <rect x="30" y="120" width="36" height="22" rx="4" fill="#EEF2FF"/>
  <text x="48" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#6C3CE1">1</text>
  <line x1="170" y1="132" x2="620" y2="132" stroke="#6C3CE1" stroke-width="2" marker-end="url(#arrRight)"/>
  <rect x="270" y="118" width="260" height="24" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="134" text-anchor="middle" font-size="10" font-weight="600" fill="#6C3CE1">initialize</text>
  <text x="400" y="158" text-anchor="middle" font-size="9" fill="#64748B">protocolVersion: "2024-11-05", clientInfo: {...}</text>

  <rect x="30" y="172" width="36" height="22" rx="4" fill="#EEF2FF"/>
  <text x="48" y="188" text-anchor="middle" font-size="10" font-weight="700" fill="#6C3CE1">2</text>
  <line x1="630" y1="184" x2="180" y2="184" stroke="#2563EB" stroke-width="2" marker-end="url(#arrLeft)"/>
  <rect x="270" y="170" width="260" height="24" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="186" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">result: serverInfo, capabilities</text>
  <text x="400" y="210" text-anchor="middle" font-size="9" fill="#64748B">protocolVersion: "2025-11-25", name: "lightpanda"</text>

  <rect x="30" y="224" width="36" height="22" rx="4" fill="#EEF2FF"/>
  <text x="48" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#6C3CE1">3</text>
  <line x1="170" y1="236" x2="620" y2="236" stroke="#6C3CE1" stroke-width="2" marker-end="url(#arrRight)"/>
  <rect x="290" y="222" width="220" height="24" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#6C3CE1">notifications/initialized</text>
  <text x="400" y="262" text-anchor="middle" font-size="9" fill="#64748B">No response — session is now active</text>

  <!-- Divider -->
  <line x1="80" y1="280" x2="720" y2="280" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="350" y="272" width="100" height="16" rx="4" fill="#F8FAFC"/>
  <text x="400" y="283" text-anchor="middle" font-size="9" font-weight="600" fill="#94A3B8">SESSION ACTIVE</text>

  <rect x="30" y="296" width="36" height="22" rx="4" fill="#ECFDF5"/>
  <text x="48" y="312" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">4</text>
  <line x1="170" y1="308" x2="620" y2="308" stroke="#6C3CE1" stroke-width="2" marker-end="url(#arrRight)"/>
  <rect x="310" y="294" width="180" height="24" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#6C3CE1">tools/list</text>

  <line x1="630" y1="340" x2="180" y2="340" stroke="#2563EB" stroke-width="2" marker-end="url(#arrLeft)"/>
  <rect x="250" y="326" width="300" height="24" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="342" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">tools: [goto, markdown, links, evaluate]</text>

  <rect x="30" y="362" width="36" height="22" rx="4" fill="#ECFDF5"/>
  <text x="48" y="378" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">5</text>
  <line x1="170" y1="374" x2="620" y2="374" stroke="#6C3CE1" stroke-width="2" marker-end="url(#arrRight)"/>
  <rect x="250" y="360" width="300" height="24" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="376" text-anchor="middle" font-size="10" font-weight="600" fill="#6C3CE1">tools/call → markdown {url: "https://..."}</text>

  <line x1="630" y1="406" x2="180" y2="406" stroke="#2563EB" stroke-width="2" marker-end="url(#arrLeft)"/>
  <rect x="260" y="392" width="280" height="24" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="408" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">result: {content: [{text: "# Page..."}]}</text>

  <rect x="30" y="428" width="36" height="22" rx="4" fill="#ECFDF5"/>
  <text x="48" y="444" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">6</text>
  <line x1="170" y1="440" x2="620" y2="440" stroke="#6C3CE1" stroke-width="2" marker-end="url(#arrRight)"/>
  <rect x="260" y="426" width="280" height="24" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="442" text-anchor="middle" font-size="10" font-weight="600" fill="#6C3CE1">resources/read → mcp://page/markdown</text>

  <line x1="630" y1="472" x2="180" y2="472" stroke="#2563EB" stroke-width="2" marker-end="url(#arrLeft)"/>
  <rect x="260" y="458" width="280" height="24" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="474" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">result: {contents: [{text: "# Page..."}]}</text>

  <!-- Footer -->
  <text x="400" y="505" text-anchor="middle" font-size="10" fill="#94A3B8">All messages are newline-delimited JSON-RPC 2.0 over stdin/stdout</text>
</svg>
