<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">MCP Tools &amp; Resources</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#64748B">Available capabilities in Lightpanda v0.2.5</text>

  <!-- Tools Section Header -->
  <rect x="40" y="76" width="100" height="26" rx="6" fill="#6C3CE1"/>
  <text x="90" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="white">4 TOOLS</text>

  <rect x="40" y="114" width="350" height="60" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="114" width="6" height="60" rx="3" fill="#6C3CE1"/>
  <text x="66" y="136" font-size="14" font-weight="700" fill="#1E293B">goto</text>
  <rect x="110" y="124" width="90" height="18" rx="4" fill="#FEE2E2"/>
  <text x="155" y="137" text-anchor="middle" font-size="9" font-weight="600" fill="#991B1B">url required</text>
  <text x="66" y="158" font-size="11" fill="#64748B">Navigate to a URL and load the page into memory</text>
  <rect x="40" y="184" width="350" height="60" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="184" width="6" height="60" rx="3" fill="#2563EB"/>
  <text x="66" y="206" font-size="14" font-weight="700" fill="#1E293B">markdown</text>
  <rect x="146" y="194" width="90" height="18" rx="4" fill="#DBEAFE"/>
  <text x="191" y="207" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">url optional</text>
  <text x="66" y="228" font-size="11" fill="#64748B">Extract page content as clean, token-efficient markdown</text>
  <rect x="40" y="254" width="350" height="60" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="254" width="6" height="60" rx="3" fill="#059669"/>
  <text x="66" y="276" font-size="14" font-weight="700" fill="#1E293B">links</text>
  <rect x="119" y="264" width="90" height="18" rx="4" fill="#D1FAE5"/>
  <text x="164" y="277" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">url optional</text>
  <text x="66" y="298" font-size="11" fill="#64748B">Extract all hyperlinks as newline-separated absolute URLs</text>
  <rect x="40" y="324" width="350" height="60" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="324" width="6" height="60" rx="3" fill="#F59E0B"/>
  <text x="66" y="346" font-size="14" font-weight="700" fill="#1E293B">evaluate</text>
  <rect x="146" y="334" width="108" height="18" rx="4" fill="#FEF3C7"/>
  <text x="200" y="347" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">script required</text>
  <rect x="260" y="334" width="90" height="18" rx="4" fill="#DBEAFE"/>
  <text x="305" y="347" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">url optional</text>
  <text x="66" y="368" font-size="11" fill="#64748B">Execute JavaScript in the page context, return result as string</text>

  <!-- Resources Section Header -->
  <rect x="430" y="76" width="130" height="26" rx="6" fill="#059669"/>
  <text x="495" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="white">2 RESOURCES</text>

  <rect x="430" y="114" width="340" height="76" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="430" y="114" width="6" height="76" rx="3" fill="#059669"/>
  <text x="456" y="138" font-size="13" font-weight="700" fill="#1E293B">mcp://page/html</text>
  <rect x="675" y="126" width="81" height="18" rx="4" fill="#D1FAE5"/>
  <text x="715" y="139" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">text/html</text>
  <text x="456" y="158" font-size="11" fill="#64748B">Raw serialized HTML DOM of the</text>
  <text x="456" y="174" font-size="11" fill="#64748B">currently loaded page</text>
  <rect x="430" y="204" width="340" height="76" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="430" y="204" width="6" height="76" rx="3" fill="#2563EB"/>
  <text x="456" y="228" font-size="13" font-weight="700" fill="#1E293B">mcp://page/markdown</text>
  <rect x="647" y="216" width="109" height="18" rx="4" fill="#DBEAFE"/>
  <text x="701" y="229" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">text/markdown</text>
  <text x="456" y="248" font-size="11" fill="#64748B">Token-efficient markdown — identical</text>
  <text x="456" y="264" font-size="11" fill="#64748B">to the markdown tool output</text>

  <!-- Future Tools Section -->
  <rect x="430" y="314" width="130" height="26" rx="6" fill="#94A3B8"/>
  <text x="495" y="332" text-anchor="middle" font-size="11" font-weight="700" fill="white">COMING SOON</text>

  <rect x="430" y="352" width="340" height="60" rx="10" fill="white" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="456" y="374" font-size="12" font-weight="600" fill="#94A3B8">semantic_tree · interactiveElements</text>
  <text x="456" y="394" font-size="12" font-weight="600" fill="#94A3B8">structuredData</text>
  <text x="720" y="384" text-anchor="middle" font-size="9" fill="#94A3B8">(via CDP today)</text>
</svg>
