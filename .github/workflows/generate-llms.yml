name: Generate llms.txt

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**/*.mdx'
  pull_request:
    paths:
      - 'src/content/**/*.mdx'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate llms.txt and llms-full.txt
        run: node scripts/generate-llms.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/llms.txt public/llms-full.txt || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated llms files
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/llms.txt public/llms-full.txt
          git commit -m "chore: regenerate llms.txt from docs content"
          git push
